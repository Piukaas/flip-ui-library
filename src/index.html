<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flip - Component Kitchen Sink</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* Simple reset for the demo grid */
    body {
      padding: 2rem;
      background: #f9fafb;
    }

    section {
      margin-bottom: 3rem;
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 0.5rem;
      text-transform: capitalize;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

  </style>
</head>
<body>
<app-root></app-root>
<!-- CTA VARIANT -->
<section>
  <h2>Variant: CTA</h2>
  <div class="grid">
    <flip-button label="Primary" variant="cta" color="primary"></flip-button>
    <flip-button label="Secondary" variant="cta" color="secondary"></flip-button>
    <flip-button label="Success" variant="cta" color="success"></flip-button>
    <flip-button label="Warning" variant="cta" color="warning"></flip-button>
    <flip-button label="Danger" variant="cta" color="danger"></flip-button>
    <flip-button label="Info" variant="cta" color="info"></flip-button>
  </div>
</section>

<!-- DEFAULT VARIANT -->
<section>
  <h2>Variant: Default</h2>
  <div class="grid">
    <flip-button label="Primary" color="primary"></flip-button>
    <flip-button label="Secondary" color="secondary"></flip-button>
    <flip-button label="Success" color="success"></flip-button>
    <flip-button label="Warning" color="warning"></flip-button>
    <flip-button label="Danger" color="danger"></flip-button>
    <flip-button label="Info" color="info"></flip-button>
  </div>
</section>

<!-- LIGHT VARIANT -->
<section>
  <h2>Variant: Light</h2>
  <div class="grid">
    <flip-button label="Primary" variant="light" color="primary"></flip-button>
    <flip-button label="Secondary" variant="light" color="secondary"></flip-button>
    <flip-button label="Success" variant="light" color="success"></flip-button>
    <flip-button label="Warning" variant="light" color="warning"></flip-button>
    <flip-button label="Danger" variant="light" color="danger"></flip-button>
    <flip-button label="Info" variant="light" color="info"></flip-button>
  </div>
</section>

<!-- GHOST VARIANT -->
<section>
  <h2>Variant: Ghost</h2>
  <div class="grid">
    <flip-button label="Primary" variant="ghost" color="primary"></flip-button>
    <flip-button label="Secondary" variant="ghost" color="secondary"></flip-button>
    <flip-button label="Success" variant="ghost" color="success"></flip-button>
    <flip-button label="Warning" variant="ghost" color="warning"></flip-button>
    <flip-button label="Danger" variant="ghost" color="danger"></flip-button>
    <flip-button label="Info" variant="ghost" color="info"></flip-button>
  </div>
</section>

<!-- TEXT VARIANT -->
<section>
  <h2>Variant: Text</h2>
  <div class="grid">
    <flip-button label="Primary" variant="text" color="primary"></flip-button>
    <flip-button label="Secondary" variant="text" color="secondary"></flip-button>
    <flip-button label="Success" variant="text" color="success"></flip-button>
    <flip-button label="Warning" variant="text" color="warning"></flip-button>
    <flip-button label="Danger" variant="text" color="danger"></flip-button>
    <flip-button label="Info" variant="text" color="info"></flip-button>
  </div>
</section>

<!-- DISABLED STATE TEST -->
<section>
  <h2>Disabled State</h2>
  <div class="grid">
    <flip-button label="Disabled CTA" variant="cta" disabled="true"></flip-button>
    <flip-button label="Disabled Default" disabled="true"></flip-button>
    <flip-button label="Disabled Light" variant="light" disabled="true"></flip-button>
    <flip-button label="Disabled Ghost" variant="ghost" disabled="true"></flip-button>
    <flip-button label="Disabled Text" variant="text" disabled="true"></flip-button>
  </div>
</section>

<!-- SIZE STATE TEST -->
<section>
  <h2>Size State</h2>
  <div class="grid">
    <flip-button label="Small CTA" variant="cta" size="small"></flip-button>
    <flip-button label="Medium CTA" variant="cta" size="medium"></flip-button>
    <flip-button label="Large CTA" variant="cta" size="large"></flip-button>
  </div>
</section>

<!-- WIDE STATE TEST -->
<section>
  <h2>Wide State</h2>
  <div class="grid">
    <flip-button label="Wide CTA" variant="cta" wide="true"></flip-button>
    <flip-button label="Wide Default" wide="true"></flip-button>
    <flip-button label="Wide Light" variant="light" wide="true"></flip-button>
    <flip-button label="Wide Ghost" variant="ghost" wide="true"></flip-button>
  </div>
</section>

</body>
</html>
